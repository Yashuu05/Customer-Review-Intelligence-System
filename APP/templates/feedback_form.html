<body class="min-h-screen flex flex-col">
<!-- Top Navigation Bar (Shared Component Anchor) -->
<header class="bg-surface dark:bg-surface-dim w-full border-b border-light-gray dark:border-outline-variant">
<div class="flex items-center justify-between px-margin-page py-4 max-w-[600px] mx-auto">
<h1 class="font-h1 text-h1 text-primary dark:text-primary-fixed-dim">
                Customer Feedback System
            </h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-[600px] mx-auto px-margin-page py-stack-lg">
<!-- Header Section -->
<section class="mb-stack-lg">
<h2 class="font-h1 text-h1 text-on-surface mb-stack-sm">Customer Feedback Form</h2>
<p class="font-body-md text-body-md text-secondary">
                Please provide your details and feedback below to help us improve our services.
            </p>
</section>
<!-- Feedback Form Container -->
<form class="bg-container-fill border border-light-gray p-stack-lg rounded-[2px]" id="feedbackForm">
<!-- Section 1: Demographics -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md mb-stack-md">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-slate-gray" for="age">Age</label>
<input class="border-light-gray font-body-md text-body-md p-3" id="age" name="age" placeholder="Enter age" type="number"/>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-slate-gray" for="gender">Gender</label>
<select class="border-light-gray font-body-md text-body-md p-3 appearance-none bg-no-repeat bg-[right_12px_center]" id="gender" name="gender" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270%27%3E%3Cpath stroke=%27%2388929A%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%272%27 d=%27m19 9-7 7-7-7%27/%3E%3C/svg%3E'); background-size: 16px;">
<option disabled="" selected="" value="">Select gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="non-binary">Non-binary</option>
<option value="prefer-not-to-say">Prefer not to say</option>
</select>
</div>
</div>
<!-- Role and Product Inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md mb-stack-md">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-slate-gray" for="role">Role</label>
<input class="border-light-gray font-body-md text-body-md p-3 w-full" id="role" name="role" placeholder="e.g. Operations Manager" type="text"/>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-slate-gray" for="product">Product</label>
<input class="border-light-gray font-body-md text-body-md p-3 w-full" id="product" name="product" placeholder="e.g. mobile phone, speaker" type="text"/>
</div>
</div>
<hr class="border-light-gray mb-stack-md"/>
<!-- Section 2: Geographic -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md mb-stack-md">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-slate-gray" for="state">State</label>
<select class="border-light-gray font-body-md text-body-md p-3 appearance-none bg-no-repeat bg-[right_12px_center]" id="state" name="state" style="background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270%27%3E%3Cpath stroke=%27%2388929A%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%272%27 d=%27m19 9-7 7-7-7%27/%3E%3C/svg%3E'); background-size: 16px;">
<option disabled="" selected="" value="">Select state</option>
<option value="CA">California</option>
<option value="NY">New York</option>
<option value="TX">Texas</option>
<option value="FL">Florida</option>
</select>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-slate-gray" for="city">City</label>
<input class="border-light-gray font-body-md text-body-md p-3" id="city" name="city" placeholder="Enter city" type="text"/>
</div>
</div>
<hr class="border-light-gray mb-stack-md"/>
<!-- Section 3: Rating -->
<div class="flex flex-col gap-stack-sm mb-stack-md">
<label class="font-label-sm text-label-sm text-slate-gray">Overall Rating</label>
<div class="flex gap-2" id="ratingContainer">
<button class="rating-block w-12 h-12 border border-light-gray flex items-center justify-center font-body-md font-bold text-on-surface hover:border-primary" data-value="1" type="button">1</button>
<button class="rating-block w-12 h-12 border border-light-gray flex items-center justify-center font-body-md font-bold text-on-surface hover:border-primary" data-value="2" type="button">2</button>
<button class="rating-block w-12 h-12 border border-light-gray flex items-center justify-center font-body-md font-bold text-on-surface hover:border-primary" data-value="3" type="button">3</button>
<button class="rating-block w-12 h-12 border border-light-gray flex items-center justify-center font-body-md font-bold text-on-surface hover:border-primary" data-value="4" type="button">4</button>
<button class="rating-block w-12 h-12 border border-light-gray flex items-center justify-center font-body-md font-bold text-on-surface hover:border-primary" data-value="5" type="button">5</button>
</div>
<input id="ratingInput" name="rating" type="hidden" value=""/>
</div>
<!-- Section 4: Customer Feedback -->
<div class="flex flex-col gap-stack-sm mb-stack-lg">
<label class="font-label-sm text-label-sm text-slate-gray" for="feedback">Customer Feedback</label>
<textarea class="border-light-gray font-body-md text-body-md p-3 w-full resize-y min-h-[120px]" id="feedback" name="feedback" placeholder="Share your experience with us..." rows="5"></textarea>
</div>
<!-- Footer Actions -->
<div class="flex justify-end items-center gap-4 pt-4 border-t border-light-gray">
<button class="font-button-text text-button-text text-secondary border border-secondary px-6 py-3 hover:bg-surface-container transition-colors cursor-pointer rounded-[2px]" id="clearBtn" type="reset">
                    Clear Form
                </button>
<button class="font-button-text text-button-text text-on-primary bg-primary-container px-8 py-3 hover:bg-forest-hover active:opacity-80 transition-colors cursor-pointer rounded-[2px]" type="submit">
                    Submit
                </button>
</div>
</form>
<!-- Illustration / Contextual Image -->
<div class="mt-stack-lg rounded-[2px] overflow-hidden border border-light-gray">
<img alt="Industrial Context" class="w-full h-48 object-cover grayscale-[0.2]" data-alt="A professional industrial office environment featuring a minimalist workspace with a clean wooden desk, a sleek modern laptop, and high-contrast architectural lighting. The scene is bright and airy, reflecting a light-mode aesthetic with a palette of forest green accents and charcoal greys. The atmosphere is calm, orderly, and technologically advanced, conveying reliability and precision in an enterprise setting." src="{{ url_for('static', filename='assets/industrial_context.png') }}" onerror="this.src='https://lh3.googleusercontent.com/aida-public/AB6AXuDSqd3R7IdORnyeDfanj_1znbsVt5Kdg3wGX3RRXyrM1J0EnvtiGWGHJwIzAI4VDs8oQ_wUcf8jiwDXQ3hWo3uqVRaCBZnFO8aG968YN2Gl82a6tB5jG4wtwXJHlezTFtnwamhpB7aIPxea_AegmPi_XrN55kxpM-r9KOsIxVfnv5kuK9S7Ap5dFmQMGyptK20EDmXg8qxk3Eq0lAYWO6UphwYNLAGdW1-YGYsvXijWZqu6bHlpbSQC82uhYxxxiMY3Ud_lKNvcSQ'"/>
</div>
</main>

<footer class="bg-surface dark:bg-surface-dim w-full border-t border-light-gray dark:border-outline-variant mt-stack-lg">
<div class="flex flex-col md:flex-row justify-between items-center px-margin-page py-gutter max-w-[600px] mx-auto">
<p class="font-helper-text text-helper-text text-secondary dark:text-secondary-fixed-dim">
                © 2025 Built by Yash Chillal
            </p>
<nav class="flex gap-4 mt-4 md:mt-0">
<a class="font-helper-text text-helper-text text-secondary hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-helper-text text-helper-text text-secondary hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-helper-text text-helper-text text-secondary hover:text-primary transition-colors" href="#">Contact Support</a>
</nav>
</div>
</footer>
<script src="{{ url_for('static', filename='feedback_form.js') }}"></script>
</body>
</html>
