<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Log In - Customer Review Intelligence</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#FFFFFF",
                        "surface-container": "#eeeeee",
                        "surface-container-low": "#f3f3f3",
                        "primary": "#002045",
                        "primary-container": "#1a365d",
                        "border": "#D9D9D9",
                        "text-primary": "#000000",
                        "secondary": "#5e5e5e",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "0px"
                    },
                    "fontFamily": {
                        "body-md": ["Roboto"],
                        "headline-md": ["Roboto"],
                        "label-sm": ["Roboto"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-md": ["18px", {"lineHeight": "24px", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                },
            },
        }
</script>
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body class="font-body-md text-text-primary h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-surface grid-border p-8 shadow-sm">
    <div class="text-center mb-8 border-b-4 border-primary pb-4">
        <h1 class="font-headline-md text-[22px] font-bold text-primary mb-2">Customer Review Intelligence</h1>
        <p class="text-secondary text-label-sm uppercase tracking-widest">Admin Console Login</p>
    </div>
    
    <h2 class="text-headline-md font-bold mb-6 text-center">Welcome Back</h2>
    
    <!-- Flash Messages (for errors) -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-4">
          {% for category, message in messages %}
            <div class="p-3 mb-2 grid-border bg-red-50 text-error text-label-sm font-bold flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">error</span>
                {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
        <div class="flex flex-col gap-2">
            <label for="email" class="font-label-sm text-secondary uppercase font-bold tracking-wider">Email Address</label>
            <input type="email" id="email" name="email" required class="w-full border-border p-2.5 text-body-md bg-surface-container-low focus:bg-surface transition-colors" placeholder="admin@example.com">
        </div>
        
        <div class="flex flex-col gap-2 relative">
            <label for="password" class="font-label-sm text-secondary uppercase font-bold tracking-wider">Password</label>
            <div class="relative">
                <input type="password" id="password" name="password" required class="w-full border-border p-2.5 pr-10 text-body-md bg-surface-container-low focus:bg-surface transition-colors">
                <button type="button" class="toggle-password absolute right-2 top-1/2 -translate-y-1/2 text-secondary hover:text-primary transition-colors" data-target="password">
                    <span class="material-symbols-outlined text-[18px]">visibility</span>
                </button>
            </div>
        </div>

        <button type="submit" class="w-full bg-primary text-white font-bold p-3 uppercase tracking-wider text-label-sm hover:bg-primary-container transition-colors mt-2">
            Log In
        </button>
    </form>

    <div class="mt-6 pt-4 border-t border-border text-center">
        <p class="text-body-md text-secondary">
            Need an account? 
            <a href="{{ url_for('signup') }}" class="text-primary font-bold hover:underline decoration-2 underline-offset-2">Sign up here</a>
        </p>
    </div>
</div>

<script src="{{ url_for('static', filename='auth.js') }}"></script>
</body>
</html>
